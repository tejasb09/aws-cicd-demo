name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy (holds the stage/region/role config)
        required: true
        type: environment

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest

    # Environment protection rules (required reviewers, wait timers, secrets)
    # are configured per-environment in repo Settings → Environments.
    environment:
      name: ${{ inputs.environment }}

    # Never run two deploys to the same environment at once.
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    permissions:
      contents: read
      id-token: write # required for AWS OIDC federation (no long-lived keys)

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Federated, short-lived credentials via OIDC — no static AWS keys in GitHub.
      # Create an IAM role with a trust policy for token.actions.githubusercontent.com
      # and store its ARN as the AWS_DEPLOY_ROLE_ARN environment secret.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Deploy
        env:
          SERVICE_NAME: ${{ vars.SERVICE_NAME }}
          STAGE: ${{ vars.STAGE }}
          NODE_RUNTIME: ${{ vars.NODE_RUNTIME }}
          CONNECT_INSTANCE_ID: ${{ vars.CONNECT_INSTANCE_ID }}
        run: |
          bunx serverless deploy \
            --stage "${{ vars.STAGE }}" \
            --region "${{ vars.AWS_REGION }}"
